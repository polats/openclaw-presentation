<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Logo mark — 48px · for favicons &amp; app chrome</div>
<div class="row" style="gap:14px;align-items:center;">
  <div style="background:var(--ink-050);padding:12px;border:1px solid var(--border);"><img src="../assets/logo-mark.svg" style="width:48px;height:48px;display:block;"></div>
  <div style="background:var(--ink-050);padding:12px;border:1px solid var(--border);"><img src="../assets/logo-mark.svg" style="width:32px;height:32px;display:block;"></div>
  <div style="background:var(--ink-050);padding:12px;border:1px solid var(--border);"><img src="../assets/logo-mark.svg" style="width:24px;height:24px;display:block;"></div>
  <div style="background:var(--bone-900);padding:12px;border:1px solid var(--border);"><img src="../assets/logo-mark.svg" style="width:32px;height:32px;display:block;filter:invert(1);"></div>
</div>
</div></body></html>
