<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Timeline track row</div>
<div style="background:var(--ink-200);border:1px solid var(--border);">
  <div class="row center" style="gap:0;border-bottom:1px solid var(--border);height:56px;">
    <div style="width:4px;height:56px;background:var(--track-synth);"></div>

      <button style="width:22px;height:22px;background:var(--ink-300);border:1px solid var(--border);color:var(--phosphor-500);font-size:9px;font-family:var(--font-mono);cursor:pointer;">S</button>
      <button style="width:22px;height:22px;background:var(--signal-500);border:none;color:var(--ink-100);font-size:9px;font-family:var(--font-mono);cursor:pointer;">R</button>
    </div>
