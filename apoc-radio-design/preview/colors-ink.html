<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Ink scale — surface backgrounds</div>
<div style="display:grid;grid-template-columns:repeat(8,1fr);gap:0;border:1px solid var(--border);">
  
    <div style="aspect-ratio:1;background:var(--ink-000);display:flex;align-items:flex-end;padding:6px;">
      <span class="mono" style="font-size:9px;color:var(--bone-500);">000</span>
    </div>
    <div style="aspect-ratio:1;background:var(--ink-050);display:flex;align-items:flex-end;padding:6px;">
      <span class="mono" style="font-size:9px;color:var(--bone-500);">050</span>
    </div>
    <div style="aspect-ratio:1;background:var(--ink-100);display:flex;align-items:flex-end;padding:6px;">
      <span class="mono" style="font-size:9px;color:var(--bone-500);">100</span>
    </div>
    <div style="aspect-ratio:1;background:var(--ink-200);display:flex;align-items:flex-end;padding:6px;">
      <span class="mono" style="font-size:9px;color:var(--bone-500);">200</span>
    </div>
    <div style="aspect-ratio:1;background:var(--ink-300);display:flex;align-items:flex-end;padding:6px;">
      <span class="mono" style="font-size:9px;color:var(--bone-500);">300</span>
    </div>
    <div style="aspect-ratio:1;background:var(--ink-400);display:flex;align-items:flex-end;padding:6px;">
      <span class="mono" style="font-size:9px;color:var(--bone-900);">400</span>
    </div>
    <div style="aspect-ratio:1;background:var(--ink-500);display:flex;align-items:flex-end;padding:6px;">
      <span class="mono" style="font-size:9px;color:var(--bone-900);">500</span>
    </div>
    <div style="aspect-ratio:1;background:var(--ink-600);display:flex;align-items:flex-end;padding:6px;">
      <span class="mono" style="font-size:9px;color:var(--bone-900);">600</span>
    </div>
</div>
<div class="mono" style="font-size:10px;color:var(--fg-dim);">--ink-000 → --ink-600 · app canvas, panels, borders</div>
</div></body></html>
