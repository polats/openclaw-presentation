<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Bone scale — foreground / text</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--border);">
  
    <div style="aspect-ratio:2/1;background:var(--bone-900);display:flex;align-items:flex-end;padding:8px;">
      <span class="mono" style="font-size:9px;color:var(--ink-100);">900</span>
    </div>
    <div style="aspect-ratio:2/1;background:var(--bone-700);display:flex;align-items:flex-end;padding:8px;">
      <span class="mono" style="font-size:9px;color:var(--ink-100);">700</span>
    </div>
    <div style="aspect-ratio:2/1;background:var(--bone-500);display:flex;align-items:flex-end;padding:8px;">
      <span class="mono" style="font-size:9px;color:var(--ink-100);">500</span>
    </div>
    <div style="aspect-ratio:2/1;background:var(--bone-300);display:flex;align-items:flex-end;padding:8px;">
      <span class="mono" style="font-size:9px;color:var(--ink-100);">300</span>
    </div>
</div>
<div class="mono" style="font-size:10px;color:var(--fg-dim);">warm off-white — we never use pure #FFFFFF</div>
</div></body></html>
