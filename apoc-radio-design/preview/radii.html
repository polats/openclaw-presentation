<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Radii — largely square</div>
<div class="row" style="gap:16px;align-items:flex-end;">
  
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:52px;height:52px;background:var(--ink-300);border:1px solid var(--border-strong);border-radius:0;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">--r-none</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:52px;height:52px;background:var(--ink-300);border:1px solid var(--border-strong);border-radius:2px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">--r-xs</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:52px;height:52px;background:var(--ink-300);border:1px solid var(--border-strong);border-radius:3px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">--r-sm</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:52px;height:52px;background:var(--ink-300);border:1px solid var(--border-strong);border-radius:6px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">--r-md</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:52px;height:52px;background:var(--ink-300);border:1px solid var(--border-strong);border-radius:10px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">--r-lg</div>
    </div>
    <div class="col" style="align-items:center;gap:6px;">
      <div style="width:52px;height:52px;background:var(--ink-300);border:1px solid var(--border-strong);border-radius:999px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">--r-pill</div>
    </div>
</div>
<div class="mono" style="font-size:10px;color:var(--fg-dim);">default: 0 or 2px · pill reserved for agent avatars + transport chips</div>
</div></body></html>
