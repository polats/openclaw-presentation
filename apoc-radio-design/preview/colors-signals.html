<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Signal accents</div>
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">
  
    <div>
      <div style="aspect-ratio:1;background:var(--signal-500);border:1px solid rgba(0,0,0,.4);"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);margin-top:6px;">Signal</div>
      <div class="mono" style="font-size:9px;color:var(--fg-dim);">#FF5A1F</div>
    </div>
    <div>
      <div style="aspect-ratio:1;background:var(--phosphor-500);border:1px solid rgba(0,0,0,.4);"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);margin-top:6px;">Phosphor</div>
      <div class="mono" style="font-size:9px;color:var(--fg-dim);">#8CFF4B</div>
    </div>
    <div>
      <div style="aspect-ratio:1;background:var(--agent-500);border:1px solid rgba(0,0,0,.4);"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);margin-top:6px;">Agent</div>
      <div class="mono" style="font-size:9px;color:var(--fg-dim);">#C56BFF</div>
    </div>
    <div>
      <div style="aspect-ratio:1;background:var(--radio-500);border:1px solid rgba(0,0,0,.4);"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);margin-top:6px;">Radio</div>
      <div class="mono" style="font-size:9px;color:var(--fg-dim);">#5EE7FF</div>
    </div>
    <div>
      <div style="aspect-ratio:1;background:var(--siren-500);border:1px solid rgba(0,0,0,.4);"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);margin-top:6px;">Siren</div>
      <div class="mono" style="font-size:9px;color:var(--fg-dim);">#FF3344</div>
    </div>
</div>
</div></body></html>
