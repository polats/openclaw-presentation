<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Voice — sample strings</div>
<div class="col" style="gap:10px;">
  <div style="padding:8px 12px;background:var(--ink-200);border-left:2px solid var(--signal-500);">
    <div class="mono" style="font-size:10px;color:var(--signal-500);letter-spacing:0.15em;">HERO</div>
    <div class="serif" style="font-size:18px;line-height:1.2;margin-top:2px;"><em>make music with the machines.</em></div>
  </div>
  <div style="padding:8px 12px;background:var(--ink-200);border-left:2px solid var(--phosphor-500);">
    <div class="mono" style="font-size:10px;color:var(--phosphor-500);letter-spacing:0.15em;">EMPTY STATE</div>
    <div style="font-family:var(--font-sans);font-size:13px;margin-top:2px;color:var(--fg);">[ signal: quiet ] — nothing on the timeline yet. drop a sample, or ask an agent.</div>
  </div>
  <div style="padding:8px 12px;background:var(--ink-200);border-left:2px solid var(--siren-500);">
    <div class="mono" style="font-size:10px;color:var(--siren-500);letter-spacing:0.15em;">ERROR</div>
    <div style="font-family:var(--font-sans);font-size:13px;margin-top:2px;color:var(--fg);">[ signal lost ] — couldn't reach NEPTUNE.</div>
  </div>
</div>
</div></body></html>
