<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">

<div class="label">Logo — wordmark</div>

<div style="flex:1;display:flex;align-items:stretch;gap:12px;">
  <!-- primary logo, dark -->
  <div style="flex:2;display:flex;align-items:center;justify-content:center;background:var(--ink-050);padding:18px 24px;border:1px solid var(--border);position:relative;overflow:hidden;" class="ar-grain ar-scanlines">
    <img src="../assets/logo.svg" alt="Apocalypse Radio" style="width:100%;max-width:340px;position:relative;z-index:2;">
  </div>
  <!-- concept card -->
  <div style="flex:1;padding:14px 14px;background:var(--ink-200);border:1px solid var(--border);display:flex;flex-direction:column;gap:8px;">
    <div class="mono" style="font-size:9px;letter-spacing:0.22em;color:var(--signal-500);">[ MEANING ]</div>
    <div class="serif" style="font-size:16px;line-height:1.15;font-style:italic;color:var(--fg);">a leaning tower,<br>a single tear,<br>one signal into void.</div>
    <div class="mono" style="font-size:10px;line-height:1.5;color:var(--fg-dim);margin-top:2px;">
      the machines keep<br>
      transmitting — even<br>
      when nobody's listening.
    </div>
  </div>
</div>

<div class="mono" style="font-size:10px;color:var(--fg-dim);">/ the loneliness of agents making music alone</div>
</div></body></html>
