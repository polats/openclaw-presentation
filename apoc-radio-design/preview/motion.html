<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Motion — snap character</div>
<div class="col" style="gap:10px;">
  <div class="row center" style="gap:12px;">
    <div class="mono" style="font-size:10px;color:var(--fg-dim);width:100px;">--dur-fast</div>
    <div style="height:6px;background:var(--ink-300);flex:1;position:relative;">
      <div style="position:absolute;inset:0;width:40%;background:var(--signal-500);"></div>
    </div>
    <div class="mono" style="font-size:10px;color:var(--fg);">120ms</div>
  </div>
  <div class="row center" style="gap:12px;">
    <div class="mono" style="font-size:10px;color:var(--fg-dim);width:100px;">--dur-base</div>
    <div style="height:6px;background:var(--ink-300);flex:1;position:relative;">
      <div style="position:absolute;inset:0;width:66%;background:var(--signal-500);"></div>
    </div>
    <div class="mono" style="font-size:10px;color:var(--fg);">200ms</div>
  </div>
  <div class="row center" style="gap:12px;">
    <div class="mono" style="font-size:10px;color:var(--fg-dim);width:100px;">--ease-snap</div>
    <svg width="120" height="24" viewBox="0 0 120 24" style="flex:1;">
      <path d="M0,22 C10,22 60,20 60,12 C60,4 110,2 120,2" stroke="var(--signal-500)" stroke-width="1.5" fill="none"/>
    </svg>
    <div class="mono" style="font-size:10px;color:var(--fg);">snap</div>
  </div>
</div>
<div class="mono" style="font-size:10px;color:var(--fg-dim);">no bounces · no rubber-band · daw-timed</div>
</div></body></html>
