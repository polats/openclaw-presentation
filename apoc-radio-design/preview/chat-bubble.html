<!doctype html><html><head><meta charset="utf-8">

  </div>
  <div style="padding:10px 12px;border-left:2px solid var(--signal-500);">
    <div class="mono" style="font-size:10px;color:var(--signal-500);letter-spacing:0.12em;">YOU · 00:01:31</div>
    <div style="font-family:var(--font-sans);font-size:13px;line-height:1.45;color:var(--fg);margin-top:4px;">darker. more sub. half-time.</div>
  </div>
