<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Semantic roles</div>
<div class="col" style="gap:8px;">
  
    <div class="row center" style="gap:12px;">
      <div style="width:28px;height:28px;background:var(--bg);border:1px solid var(--ink-600);"></div>
      <div class="mono" style="font-size:11px;color:var(--fg);min-width:110px;">--bg</div>
      <div class="mono" style="font-size:10px;color:var(--fg-dim);">app canvas</div>
    </div>
    <div class="row center" style="gap:12px;">
      <div style="width:28px;height:28px;background:var(--bg-raised);border:1px solid var(--ink-600);"></div>
      <div class="mono" style="font-size:11px;color:var(--fg);min-width:110px;">--bg-raised</div>
      <div class="mono" style="font-size:10px;color:var(--fg-dim);">panel</div>
    </div>
    <div class="row center" style="gap:12px;">
      <div style="width:28px;height:28px;background:var(--fg);border:1px solid var(--ink-600);"></div>
      <div class="mono" style="font-size:11px;color:var(--fg);min-width:110px;">--fg</div>
      <div class="mono" style="font-size:10px;color:var(--fg-dim);">primary text</div>
    </div>
    <div class="row center" style="gap:12px;">
      <div style="width:28px;height:28px;background:var(--fg-muted);border:1px solid var(--ink-600);"></div>
      <div class="mono" style="font-size:11px;color:var(--fg);min-width:110px;">--fg-muted</div>
      <div class="mono" style="font-size:10px;color:var(--fg-dim);">secondary text</div>
    </div>
    <div class="row center" style="gap:12px;">
      <div style="width:28px;height:28px;background:var(--border);border:1px solid var(--ink-600);"></div>
      <div class="mono" style="font-size:11px;color:var(--fg);min-width:110px;">--border</div>
      <div class="mono" style="font-size:10px;color:var(--fg-dim);">1px default</div>
    </div>
    <div class="row center" style="gap:12px;">
      <div style="width:28px;height:28px;background:var(--accent);border:1px solid var(--ink-600);"></div>
      <div class="mono" style="font-size:11px;color:var(--fg);min-width:110px;">--accent</div>
      <div class="mono" style="font-size:10px;color:var(--fg-dim);">primary action</div>
    </div>
    <div class="row center" style="gap:12px;">
      <div style="width:28px;height:28px;background:var(--danger);border:1px solid var(--ink-600);"></div>
      <div class="mono" style="font-size:11px;color:var(--fg);min-width:110px;">--danger</div>
      <div class="mono" style="font-size:10px;color:var(--fg-dim);">destructive</div>
    </div>
</div>
</div></body></html>
