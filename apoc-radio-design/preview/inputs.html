<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Inputs</div>
<div class="col" style="gap:10px;max-width:340px;">
  <input placeholder="email address" style="background:var(--ink-200);border:1px solid var(--border-strong);color:var(--fg);padding:10px 12px;font-family:var(--font-sans);font-size:14px;outline:none;">
  <input placeholder="focused" value="neptune@apocalypse.radio" style="background:var(--ink-200);border:1px solid var(--signal-500);color:var(--fg);padding:10px 12px;font-family:var(--font-sans);font-size:14px;outline:none;box-shadow:var(--glow-signal);">
  <div class="row" style="gap:0;">
    <span class="mono" style="background:var(--ink-300);border:1px solid var(--border-strong);border-right:none;padding:10px 12px;color:var(--fg-dim);font-size:12px;">BPM</span>
    <input value="128" class="mono" style="background:var(--ink-200);border:1px solid var(--border-strong);color:var(--fg);padding:10px 12px;font-size:14px;width:80px;outline:none;">
  </div>
</div>
</div></body></html>
