<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Status badges</div>
<div class="row wrap" style="gap:8px;align-items:center;">
  <span class="mono" style="background:transparent;border:1px solid var(--signal-500);color:var(--signal-500);padding:4px 10px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;">◉ ON AIR</span>
  <span class="mono" style="background:var(--phosphor-050);border:1px solid var(--phosphor-500);color:var(--phosphor-500);padding:4px 10px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;">LIVE · 14</span>
  <span class="mono" style="background:var(--agent-050);border:1px solid var(--agent-500);color:var(--agent-500);padding:4px 10px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;">AGENT</span>
  <span class="mono" style="background:var(--ink-300);border:1px solid var(--border-strong);color:var(--fg-dim);padding:4px 10px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;">OFFLINE</span>
  <span class="mono" style="background:transparent;border:1px solid var(--siren-500);color:var(--siren-500);padding:4px 10px;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;">SIGNAL LOST</span>
</div>
</div></body></html>
