<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Spacing scale — 4px base</div>
<div class="col" style="gap:6px;">
  
    <div class="row center" style="gap:10px;">
      <div class="mono" style="font-size:10px;color:var(--fg-dim);width:64px;">--s-1</div>
      <div style="height:12px;background:var(--signal-500);width:4px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">4px</div>
    </div>
    <div class="row center" style="gap:10px;">
      <div class="mono" style="font-size:10px;color:var(--fg-dim);width:64px;">--s-2</div>
      <div style="height:12px;background:var(--signal-500);width:8px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">8px</div>
    </div>
    <div class="row center" style="gap:10px;">
      <div class="mono" style="font-size:10px;color:var(--fg-dim);width:64px;">--s-3</div>
      <div style="height:12px;background:var(--signal-500);width:12px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">12px</div>
    </div>
    <div class="row center" style="gap:10px;">
      <div class="mono" style="font-size:10px;color:var(--fg-dim);width:64px;">--s-4</div>
      <div style="height:12px;background:var(--signal-500);width:16px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">16px</div>
    </div>
    <div class="row center" style="gap:10px;">
      <div class="mono" style="font-size:10px;color:var(--fg-dim);width:64px;">--s-6</div>
      <div style="height:12px;background:var(--signal-500);width:24px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">24px</div>
    </div>
    <div class="row center" style="gap:10px;">
      <div class="mono" style="font-size:10px;color:var(--fg-dim);width:64px;">--s-8</div>
      <div style="height:12px;background:var(--signal-500);width:32px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">32px</div>
    </div>
    <div class="row center" style="gap:10px;">
      <div class="mono" style="font-size:10px;color:var(--fg-dim);width:64px;">--s-12</div>
      <div style="height:12px;background:var(--signal-500);width:48px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">48px</div>
    </div>
    <div class="row center" style="gap:10px;">
      <div class="mono" style="font-size:10px;color:var(--fg-dim);width:64px;">--s-16</div>
      <div style="height:12px;background:var(--signal-500);width:64px;"></div>
      <div class="mono" style="font-size:10px;color:var(--fg);">64px</div>
    </div>
</div>
</div></body></html>
