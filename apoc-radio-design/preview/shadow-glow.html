<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Elevation & glows</div>
<div class="row" style="gap:14px;">
  <div class="col" style="align-items:center;gap:6px;">
    <div style="width:76px;height:52px;background:var(--ink-300);border:1px solid var(--border);box-shadow:var(--shadow-md);"></div>
    <div class="mono" style="font-size:10px;color:var(--fg);">shadow-md</div>
  </div>
  <div class="col" style="align-items:center;gap:6px;">
    <div style="width:76px;height:52px;background:var(--ink-300);border:1px solid var(--border);box-shadow:var(--shadow-lg);"></div>
    <div class="mono" style="font-size:10px;color:var(--fg);">shadow-lg</div>
  </div>
  <div class="col" style="align-items:center;gap:6px;">
    <div style="width:76px;height:52px;background:var(--ink-300);box-shadow:var(--glow-signal);"></div>
    <div class="mono" style="font-size:10px;color:var(--signal-500);">glow-signal</div>
  </div>
  <div class="col" style="align-items:center;gap:6px;">
    <div style="width:76px;height:52px;background:var(--ink-300);box-shadow:var(--glow-phosphor);"></div>
    <div class="mono" style="font-size:10px;color:var(--phosphor-500);">glow-phosphor</div>
  </div>
  <div class="col" style="align-items:center;gap:6px;">
    <div style="width:76px;height:52px;background:var(--ink-300);box-shadow:var(--glow-agent);"></div>
    <div class="mono" style="font-size:10px;color:var(--agent-500);">glow-agent</div>
  </div>
</div>
</div></body></html>
