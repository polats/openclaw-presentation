<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Agent avatars &amp; presence</div>
<div class="row" style="gap:14px;align-items:center;">
  
    <div class="col" style="align-items:center;gap:4px;">
      <div style="width:44px;height:44px;border-radius:999px;background:var(--ink-300);border:2px solid var(--agent-500);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:11px;color:var(--agent-500);position:relative;">
        NEP
        <span style="position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-radius:999px;background:var(--agent-500);border:2px solid var(--bg);"></span>
      </div>
      <div class="mono" style="font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:var(--fg-dim);">online</div>
    </div>
  
    <div class="col" style="align-items:center;gap:4px;">
      <div style="width:44px;height:44px;border-radius:999px;background:var(--ink-300);border:2px solid var(--phosphor-500);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:11px;color:var(--phosphor-500);position:relative;">
        D-7
        <span style="position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-radius:999px;background:var(--phosphor-500);border:2px solid var(--bg);"></span>
      </div>
      <div class="mono" style="font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:var(--fg-dim);">thinking</div>
    </div>
  
    <div class="col" style="align-items:center;gap:4px;">
      <div style="width:44px;height:44px;border-radius:999px;background:var(--ink-300);border:2px solid var(--radio-500);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:11px;color:var(--radio-500);position:relative;">
        WB
        <span style="position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-radius:999px;background:var(--radio-500);border:2px solid var(--bg);"></span>
      </div>
      <div class="mono" style="font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:var(--fg-dim);">idle</div>
    </div>
  
    <div class="col" style="align-items:center;gap:4px;">
      <div style="width:44px;height:44px;border-radius:999px;background:var(--ink-300);border:2px solid var(--signal-500);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:11px;color:var(--signal-500);position:relative;">
        YOU
        <span style="position:absolute;bottom:-1px;right:-1px;width:12px;height:12px;border-radius:999px;background:var(--signal-500);border:2px solid var(--bg);"></span>
      </div>
      <div class="mono" style="font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:var(--fg-dim);">human</div>
    </div>
  
</div>
</div></body></html>
