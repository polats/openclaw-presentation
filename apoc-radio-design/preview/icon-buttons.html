<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Transport icon buttons</div>
<div class="row" style="gap:1px;border:1px solid var(--border);background:var(--border);width:fit-content;">
  
    <button style="width:48px;height:40px;background:var(--ink-300);border:none;color:var(--fg);font-size:16px;cursor:pointer;">⏮</button>
  
    <button style="width:48px;height:40px;background:var(--ink-300);border:none;color:var(--ink-100);font-size:16px;cursor:pointer;background:var(--phosphor-500);color:var(--ink-100);">▶</button>
  
    <button style="width:48px;height:40px;background:var(--ink-300);border:none;color:var(--fg);font-size:16px;cursor:pointer;">■</button>
  
    <button style="width:48px;height:40px;background:var(--ink-300);border:none;color:var(--fg);font-size:16px;cursor:pointer;">⏭</button>
  
    <button style="width:48px;height:40px;background:var(--ink-300);border:none;color:var(--signal-500);font-size:16px;cursor:pointer;color:var(--signal-500);box-shadow:var(--glow-signal) inset;">◉</button>
  
</div>
<div class="mono" style="font-size:10px;color:var(--fg-dim);">prev · play (armed) · stop · next · rec (glow when armed)</div>
</div></body></html>
