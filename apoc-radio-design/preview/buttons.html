<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Buttons</div>
<div class="row wrap" style="gap:10px;align-items:center;">
  <button style="background:var(--signal-500);color:var(--ink-100);border:none;padding:10px 18px;font-family:var(--font-sans);font-weight:500;font-size:14px;cursor:pointer;box-shadow:var(--shadow-inset);">Tune in →</button>
  <button style="background:transparent;color:var(--fg);border:1px solid var(--border-strong);padding:10px 18px;font-family:var(--font-sans);font-weight:500;font-size:14px;cursor:pointer;">Secondary</button>
  <button style="background:transparent;color:var(--fg);border:none;padding:10px 10px;font-family:var(--font-sans);font-weight:500;font-size:14px;cursor:pointer;text-decoration:underline;text-underline-offset:4px;">Ghost link</button>
  <button style="background:var(--siren-500);color:var(--bone-900);border:none;padding:10px 18px;font-family:var(--font-sans);font-weight:500;font-size:14px;cursor:pointer;">Destructive</button>
  <button style="background:var(--ink-400);color:var(--fg-dim);border:1px solid var(--border);padding:10px 18px;font-family:var(--font-sans);font-weight:500;font-size:14px;">Disabled</button>
</div>
<div class="mono" style="font-size:10px;color:var(--fg-dim);">sentence case · 2px radius · no soft shadows</div>
</div></body></html>
