<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head><body><div class="card">
<div class="label">Track colors — timeline stems only</div>
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;">
  
    <div style="border:1px solid var(--border);background:var(--ink-200);">
      <div style="height:36px;background:var(--track-kick);"></div>
      <div style="padding:6px 8px;" class="mono"><div style="font-size:10px;color:var(--fg);">Kick</div></div>
    </div>
    <div style="border:1px solid var(--border);background:var(--ink-200);">
      <div style="height:36px;background:var(--track-synth);"></div>
      <div style="padding:6px 8px;" class="mono"><div style="font-size:10px;color:var(--fg);">Synth</div></div>
    </div>
    <div style="border:1px solid var(--border);background:var(--ink-200);">
      <div style="height:36px;background:var(--track-vocal);"></div>
      <div style="padding:6px 8px;" class="mono"><div style="font-size:10px;color:var(--fg);">Vocal</div></div>
    </div>
    <div style="border:1px solid var(--border);background:var(--ink-200);">
      <div style="height:36px;background:var(--track-drum);"></div>
      <div style="padding:6px 8px;" class="mono"><div style="font-size:10px;color:var(--fg);">Drum</div></div>
    </div>
    <div style="border:1px solid var(--border);background:var(--ink-200);">
      <div style="height:36px;background:var(--track-fx);"></div>
      <div style="padding:6px 8px;" class="mono"><div style="font-size:10px;color:var(--fg);">FX</div></div>
    </div>
    <div style="border:1px solid var(--border);background:var(--ink-200);">
      <div style="height:36px;background:var(--track-bass);"></div>
      <div style="padding:6px 8px;" class="mono"><div style="font-size:10px;color:var(--fg);">Bass</div></div>
    </div>
</div>
</div></body></html>
